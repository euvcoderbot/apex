<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APEX DATA</title><style>
:root{--bg:#f4f3ef;--ink:#101114;--line:#d5d4cf;--muted:#747671;--red:#ff321e;--glow:rgba(255,50,30,.42)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:13px Arial,sans-serif}.top{height:64px;padding:21px 5%;border-bottom:1px solid var(--line);font-weight:900;letter-spacing:-2px;font-size:20px}.top b{color:var(--red)}main{max-width:1300px;margin:auto;padding:28px 5%}.mono,label,.section{font:10px monospace;letter-spacing:1px;text-transform:uppercase}.filters{display:grid;grid-template-columns:1fr 1.7fr 1fr auto;gap:10px;border-bottom:1px solid var(--ink);padding-bottom:20px}.filters label{display:block;color:var(--muted);margin-bottom:6px}.filters select,.filters button{width:100%;height:40px;border:1px solid var(--line);background:#fff;padding:0 10px}.filters button{background:var(--ink);color:#fff;font-weight:bold;cursor:pointer}.section{display:block;color:var(--muted);margin-bottom:10px}.block{padding:18px 0;border-bottom:1px solid var(--ink)}.pills,.lap-pills{display:flex;flex-wrap:wrap;gap:8px}.pill,.stint,.lap{border:1px solid var(--line);background:#fff;border-radius:3px;padding:8px 10px;cursor:pointer;transition:transform .14s ease,box-shadow .14s ease,border-color .14s ease}.pill:hover,.stint:hover,.lap:hover{transform:translateY(-2px);border-color:var(--ink);box-shadow:0 5px 14px #0002}.pill.active,.stint.active,.lap.active{border-color:var(--accent,var(--red));box-shadow:0 0 0 2px color-mix(in srgb,var(--accent,var(--red)) 35%,transparent),0 0 16px var(--glow);transform:translateY(-1px)}.logo{display:inline-grid;place-items:center;width:15px;height:12px;border-radius:2px;color:#fff;font:bold 8px Arial;margin-right:5px}.laps{display:grid;gap:15px}.driver-laps{padding-top:14px;border-top:1px solid var(--line)}.driver-laps:first-child{border:0;padding-top:0}.stints{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.stint small{display:block;color:var(--muted);font:9px monospace;margin-top:3px}.loaded{display:grid;gap:8px}.loaded-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.driver-tag{width:38px;font:10px monospace;color:var(--muted)}.reference{background:#17181b!important;color:#fff;border-color:#17181b!important;box-shadow:0 0 0 2px #17181b,0 0 18px #ff321e77!important}.reference:before{content:'REF ';color:#d6fb43;font:9px monospace}.x{margin-left:6px;border:0;background:none;color:inherit;cursor:pointer}.summary{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--ink)}.summary div{padding:17px;border-right:1px solid var(--line)}.summary div:last-child{border:0}.summary small{font:10px monospace;color:var(--muted)}.summary b{display:block;font-size:19px;margin-top:4px}.deltas{font:10px monospace;line-height:1.7}.telemetry{padding-top:26px}.sector-table{margin:12px 0;border:1px solid var(--line)}.sector-head,.sector-row{display:grid;grid-template-columns:1.3fr 1fr 1fr 1fr}.sector-head{background:#17181b;color:#fff;font:10px monospace}.sector-head span,.sector-row span{padding:9px 11px;border-right:1px solid var(--line)}.sector-row{border-top:1px solid var(--line);font:11px monospace}.plot{position:relative;border-top:1px solid var(--line);padding-top:9px}.plot h3{font-size:12px;margin:0 0 6px}.plot canvas{width:100%;height:120px;display:block}.sector-labels{position:absolute;left:44px;right:6px;top:33px;bottom:0;pointer-events:none}.sector-labels span{position:absolute;top:0;height:100%;border-left:1px dashed #9b9b96;padding:3px 5px;color:var(--muted);font:9px monospace}.sector-labels span:nth-child(1){left:0;border:0}.sector-labels span:nth-child(2){left:31%}.sector-labels span:nth-child(3){left:66%}.tip{position:absolute;display:none;background:#17181b;color:#fff;padding:8px 10px;font:10px monospace;pointer-events:none;z-index:2}.tip b{color:#d6fb43}@media(max-width:650px){.filters{grid-template-columns:1fr 1fr}.filters button{grid-column:span 2}.summary{grid-template-columns:1fr}.summary div{border-right:0;border-bottom:1px solid var(--line)}.sector-head,.sector-row{grid-template-columns:1.1fr 1fr 1fr 1fr}.sector-head span,.sector-row span{padding:8px 5px}.plot canvas{height:95px}}
</style></head><body><header class="top">APEX<b>///</b>DATA</header><main>
<section class="filters"><div><label>Season</label><select><option>2025</option></select></div><div><label>Grand Prix</label><select><option>British Grand Prix</option></select></div><div><label>Session</label><select><option>Qualifying</option></select></div><button>LOAD SESSION</button></section>
<section class="block"><span class="section">Select drivers</span><div class="pills" id="drivers"></div></section><section class="block"><span class="section">Stints and laps</span><div class="laps" id="laps"></div></section><section class="block"><span class="section">Loaded laps · click a pill to make it reference</span><div class="loaded" id="loaded"></div></section>
<section class="summary"><div><small>REFERENCE LAP</small><b id="ref">VER · L12 · 1:26.522</b></div><div><small>LOADED LAPS</small><b id="num">01</b></div><div><small>FINAL DELTAS</small><div class="deltas" id="deltas">VER L12 · REFERENCE</div></div></section>
<section class="telemetry"><span class="section">Selected lap sectors</span><div class="sector-table"><div class="sector-head"><span>Loaded lap</span><span>Sector 1</span><span>Sector 2</span><span>Sector 3</span></div><div id="sectors"></div></div><div class="plot"><h3>Speed trace <small class="mono">KM/H</small></h3><div class="sector-labels"><span>SECTOR 1</span><span>SECTOR 2</span><span>SECTOR 3</span></div><div class="tip" id="tip"></div><canvas id="chart"></canvas></div></section></main>
<script>
const D=[['VER','1','Verstappen','#3671c6','RB'],['NOR','4','Norris','#ff8000','MC'],['LEC','16','Leclerc','#e8002d','FE'],['PIA','81','Piastri','#ff8000','MC'],['RUS','63','Russell','#27f4d2','ME'],['HAM','44','Hamilton','#e8002d','FE']];let selected=['VER'],loaded=[{c:'VER',l:12,t:86.522}],open={VER:0};const $=s=>document.querySelector(s);function fmt(t){return '1:'+t.toFixed(3).padStart(6,'0')}function driver(){ $('#drivers').innerHTML=D.map(d=>'<button class="pill '+(selected.includes(d[0])?'active':'')+'" style="--accent:'+d[3]+'" data-c="'+d[0]+'"><i class="logo" style="background:'+d[3]+'">'+d[4]+'</i>#'+d[1]+' · '+d[0]+'</button>').join('');document.querySelectorAll('#drivers button').forEach(b=>b.onclick=()=>{let c=b.dataset.c;if(selected.includes(c)){if(selected.length>1)selected=selected.filter(x=>x!==c)}else selected.push(c);driver();laps()})}function laps(){ $('#laps').innerHTML=selected.map(c=>{let d=D.find(x=>x[0]===c),s=open[c]||0,st=[['STINT 1','SOFT',7],['STINT 2','MEDIUM',9],['STINT 3','HARD',5]];let start=[1,8,17][s];return '<div class="driver-laps"><span class="section">'+c+' · '+d[2]+'</span><div class="stints">'+st.map((a,i)=>'<button class="stint '+(i===s?'active':'')+'" style="--accent:'+d[3]+'" data-c="'+c+'" data-s="'+i+'">'+a[0]+'<small>'+a[1]+' · '+a[2]+' laps</small></button>').join('')+'</div><div class="lap-pills">'+Array.from({length:st[s][2]},(_,i)=>{let l=start+i,t=86.522+(c.charCodeAt(0)%7)*.07+i*.18;return '<button class="lap" style="--accent:'+d[3]+'" data-c="'+c+'" data-l="'+l+'" data-t="'+t+'">LAP '+l+' · '+fmt(t)+'s</button>'}).join('')+'</div></div>'}).join('');document.querySelectorAll('.stint').forEach(b=>b.onclick=()=>{open[b.dataset.c]=+b.dataset.s;laps()});document.querySelectorAll('.lap').forEach(b=>b.onclick=()=>{if(!loaded.some(x=>x.c===b.dataset.c&&x.l===+b.dataset.l))loaded.push({c:b.dataset.c,l:+b.dataset.l,t:+b.dataset.t});render()})}function render(){let r=loaded[0];$('#loaded').innerHTML=selected.map(c=>{let a=loaded.map((x,i)=>({...x,i})).filter(x=>x.c===c);return a.length?'<div class="loaded-row"><span class="driver-tag">'+c+'</span>'+a.map(x=>'<button class="pill '+(x.i===0?'reference':'')+'" data-i="'+x.i+'">L'+x.l+' · '+fmt(x.t)+'<span class="x" data-x="'+x.i+'">×</span></button>').join('')+'</div>':''}).join('');document.querySelectorAll('#loaded .pill').forEach(b=>b.onclick=e=>{if(e.target.dataset.x!==undefined){loaded.splice(+e.target.dataset.x,1)}else{let i=+b.dataset.i;loaded.unshift(loaded.splice(i,1)[0])}render()});$('#ref').textContent=r?r.c+' · L'+r.l+' · '+fmt(r.t):'—';$('#num').textContent=String(loaded.length).padStart(2,'0');$('#deltas').innerHTML=loaded.map((x,i)=>i?x.c+' L'+x.l+' · '+(x.t-r.t>=0?'+':'')+(x.t-r.t).toFixed(3)+'s':' '+x.c+' L'+x.l+' · REFERENCE').join('<br>');$('#sectors').innerHTML=loaded.map((x,i)=>'<div class="sector-row"><span>'+x.c+' · L'+x.l+'</span><span>'+fmt(27.9+i*.07).slice(2)+'</span><span>'+fmt(31.3+i*.08).slice(2)+'</span><span>'+fmt(x.t-59.2-i*.15).slice(2)+'</span></div>').join('');draw()}function draw(){let c=$('#chart'),r=c.getBoundingClientRect(),d=devicePixelRatio;c.width=r.width*d;c.height=r.height*d;let x=c.getContext('2d');x.scale(d,d);x.clearRect(0,0,r.width,r.height);loaded.forEach((q,n)=>{let col=D.find(z=>z[0]===q.c)[3];x.strokeStyle=col;x.lineWidth=2;x.beginPath();for(let i=0;i<100;i++){let px=44+i*(r.width-50)/99,py=20+(280-(220+65*Math.sin(i*.12+n*.2)+35*Math.sin(i*.31)))/220*(r.height-35);i?x.lineTo(px,py):x.moveTo(px,py)}x.stroke()})}$('#chart').onmousemove=e=>{let r=e.target.getBoundingClientRect(),p=(e.clientX-r.left-44)/(r.width-50),i=Math.max(0,Math.min(99,Math.round(p*99)));$('#tip').style.cssText='display:block;left:'+Math.max(45,e.clientX-r.left+8)+'px;top:'+(e.clientY-r.top-25)+'px';$('#tip').innerHTML='<b>'+(p*5.891).toFixed(3)+' KM</b><br>'+loaded.map((q,n)=>q.c+' '+Math.round(220+65*Math.sin(i*.12+n*.2))+' km/h').join('<br>')};$('#chart').onmouseleave=()=>$('#tip').style.display='none';window.onresize=draw;driver();laps();render();
</script></body></html>
