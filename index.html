<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APEX DATA — Telemetry</title><style>
:root{--paper:#f5f4f0;--ink:#111216;--muted:#777873;--line:#d6d5cf;--red:#ff321e;--dark:#191a1e}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font:13px Arial,sans-serif}.top{height:64px;padding:20px 5%;border-bottom:1px solid var(--line);font-size:20px;font-weight:900;letter-spacing:-2px}.top b{color:var(--red)}main{max-width:1280px;margin:auto;padding:26px 5%}.mono,.section,label{font:10px monospace;letter-spacing:.11em;text-transform:uppercase}.filters{display:grid;grid-template-columns:.65fr 1.35fr .9fr auto;gap:10px;padding-bottom:20px;border-bottom:1px solid var(--ink)}label{display:block;color:var(--muted);margin-bottom:6px}.filters select,.filters button{height:41px;width:100%;padding:0 10px;border:1px solid var(--line);background:#fff}.filters button{background:var(--ink);color:#fff;font-weight:bold;cursor:pointer}.block{padding:18px 0;border-bottom:1px solid var(--ink)}.section{display:block;color:var(--muted);margin-bottom:10px}.row,.lap-list,.stints{display:flex;gap:8px;flex-wrap:wrap}.chip,.stint,.lap{border:1px solid var(--line);background:#fff;border-radius:3px;padding:8px 10px;font-size:11px;cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s}.chip:hover,.stint:hover,.lap:hover{transform:translateY(-2px);box-shadow:0 5px 14px #0002;border-color:#777}.on{border-color:var(--c)!important;box-shadow:0 0 0 2px color-mix(in srgb,var(--c) 38%,transparent),0 0 18px color-mix(in srgb,var(--c) 42%,transparent)!important}.team{display:inline-grid;place-items:center;width:15px;height:12px;border-radius:2px;background:var(--c);color:#fff;font-size:8px;font-weight:800;margin-right:4px}.driver-laps{padding:13px 0;border-top:1px solid var(--line)}.driver-laps:first-child{padding-top:0;border:0}.stints{margin:8px 0 12px}.stint small{display:block;margin-top:3px;color:var(--muted);font:9px monospace}.loaded{display:grid;gap:8px}.loaded-line{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.loaded-line label{margin:0;width:42px}.ref{background:var(--dark)!important;color:#fff;border-color:var(--dark)!important;box-shadow:0 0 0 2px var(--dark),0 0 18px #ff321e88!important}.ref:before{content:'REF ';color:#d6fb43;font:9px monospace}.remove{border:0;background:none;color:inherit;cursor:pointer;font-weight:bold;margin-left:6px}.summary{display:grid;grid-template-columns:1.1fr .55fr 1.4fr;border-bottom:1px solid var(--ink)}.summary>div{padding:17px;border-right:1px solid var(--line)}.summary>div:last-child{border:0}.summary small{font:10px monospace;color:var(--muted)}.summary b{display:block;font-size:18px;margin-top:4px}.finals{font:10px monospace;line-height:1.65}.telemetry{padding-top:24px}.sector-table{border:1px solid var(--line);margin:10px 0 22px}.sector-head,.sector-line{display:grid;grid-template-columns:1.3fr 1fr 1fr 1fr}.sector-head{background:var(--dark);color:#fff;font:10px monospace}.sector-head span,.sector-line span{padding:9px 11px;border-right:1px solid var(--line)}.sector-line{border-top:1px solid var(--line);font:11px monospace}.chart-box{position:relative}.chart-title{display:flex;justify-content:space-between;border-top:1px solid var(--ink);padding:10px 0 4px;font-size:12px;font-weight:bold}.chart-title small{color:var(--muted);font:10px monospace}.sector-overlay{position:absolute;top:35px;left:42px;right:6px;height:calc(100% - 26px);pointer-events:none}.sector-overlay i{position:absolute;top:0;height:100%;border-left:1px dashed #9b9c97;padding:3px 5px;color:var(--muted);font:9px monospace;font-style:normal}.sector-overlay i:nth-child(1){left:0;border:0}.sector-overlay i:nth-child(2){left:31%}.sector-overlay i:nth-child(3){left:66%}canvas{display:block;width:100%;height:128px;cursor:crosshair}.small canvas{height:76px}.tip{display:none;position:absolute;background:var(--dark);color:white;padding:8px 10px;z-index:2;font:10px/1.5 monospace;pointer-events:none}.tip b{color:#d6fb43}@media(max-width:700px){main{padding:20px 4%}.filters{grid-template-columns:1fr 1fr}.filters button{grid-column:span 2}.summary{grid-template-columns:1fr}.summary>div{border-right:0;border-bottom:1px solid var(--line)}.sector-head,.sector-line{grid-template-columns:1.1fr 1fr 1fr 1fr}.sector-head span,.sector-line span{padding:8px 5px}canvas{height:100px}.small canvas{height:66px}}
</style></head><body><header class="top">APEX<b>///</b>DATA</header><main>
<section class="filters"><div><label>Season</label><select><option>2025</option></select></div><div><label>Grand Prix</label><select><option>British Grand Prix — Silverstone</option></select></div><div><label>Session</label><select><option>Qualifying</option></select></div><button id="load">LOAD SESSION</button></section>
<section class="block"><span class="section">Select drivers</span><div class="row" id="drivers"></div></section><section class="block"><span class="section">Stints and laps</span><div id="lapArea"></div></section><section class="block"><span class="section">Loaded laps · click any pill to make it reference</span><div class="loaded" id="loaded"></div></section>
<section class="summary"><div><small>Reference lap</small><b id="refText">VER · L12 · 1:26.522</b></div><div><small>Loaded laps</small><b id="loadedCount">01</b></div><div><small>Final deltas</small><div class="finals" id="deltas"></div></div></section>
<section class="telemetry"><span class="section">Selected lap sector times</span><div class="sector-table"><div class="sector-head"><span>Loaded lap</span><span>Sector 1</span><span>Sector 2</span><span>Sector 3</span></div><div id="sectorRows"></div></div><div id="charts"></div></section></main>
<script>
const D=[['VER','1','Verstappen','#3671c6','RB'],['NOR','4','Norris','#ff8000','MC'],['LEC','16','Leclerc','#e8002d','FE'],['PIA','81','Piastri','#ff8000','MC'],['RUS','63','Russell','#27f4d2','ME'],['HAM','44','Hamilton','#e8002d','FE']];let selected=['VER'],loaded=[{c:'VER',l:12,t:86.522}],stint={VER:0};const $=q=>document.querySelector(q);const f=t=>'1:'+t.toFixed(3).padStart(6,'0');function drivers(){ $('#drivers').innerHTML=D.map(d=>'<button class="chip '+(selected.includes(d[0])?'on':'')+'" style="--c:'+d[3]+'" data-c="'+d[0]+'"><i class="team">'+d[4]+'</i>#'+d[1]+' · '+d[0]+'</button>').join('');document.querySelectorAll('#drivers button').forEach(b=>b.onclick=()=>{let c=b.dataset.c;if(selected.includes(c)){if(selected.length>1)selected=selected.filter(x=>x!==c)}else selected.push(c);drivers();laps()})}function laps(){ $('#lapArea').innerHTML=selected.map(c=>{let d=D.find(x=>x[0]===c),s=stint[c]||0,a=[['STINT 1','SOFT',7],['STINT 2','MEDIUM',9],['STINT 3','HARD',5]],start=[1,8,17][s];return '<div class="driver-laps"><span class="section">'+c+' · '+d[2]+'</span><div class="stints">'+a.map((x,i)=>'<button class="stint '+(s===i?'on':'')+'" style="--c:'+d[3]+'" data-c="'+c+'" data-s="'+i+'">'+x[0]+'<small>'+x[1]+' · '+x[2]+' laps</small></button>').join('')+'</div><div class="lap-list">'+Array.from({length:a[s][2]},(_,i)=>{let l=start+i,t=86.522+(c.charCodeAt(0)%7)*.067+i*.183;return '<button class="lap" style="--c:'+d[3]+'" data-c="'+c+'" data-l="'+l+'" data-t="'+t+'">LAP '+l+' · '+f(t)+'s</button>'}).join('')+'</div></div>'}).join('');document.querySelectorAll('.stint').forEach(b=>b.onclick=()=>{stint[b.dataset.c]=+b.dataset.s;laps()});document.querySelectorAll('.lap').forEach(b=>b.onclick=()=>{if(!loaded.some(x=>x.c===b.dataset.c&&x.l===+b.dataset.l))loaded.push({c:b.dataset.c,l:+b.dataset.l,t:+b.dataset.t});render()})}function render(){let r=loaded[0];$('#loaded').innerHTML=selected.map(c=>{let a=loaded.map((x,i)=>({...x,i})).filter(x=>x.c===c);return a.length?'<div class="loaded-line"><label>'+c+'</label>'+a.map(x=>'<button class="chip '+(x.i===0?'ref':'')+'" data-i="'+x.i+'">L'+x.l+' · '+f(x.t)+'<span class="remove" data-x="'+x.i+'">×</span></button>').join('')+'</div>':''}).join('');document.querySelectorAll('#loaded .chip').forEach(b=>b.onclick=e=>{if(e.target.dataset.x!==undefined)loaded.splice(+e.target.dataset.x,1);else{let i=+b.dataset.i;loaded.unshift(loaded.splice(i,1)[0])}render()});$('#refText').textContent=r?r.c+' · L'+r.l+' · '+f(r.t):'—';$('#loadedCount').textContent=String(loaded.length).padStart(2,'0');$('#deltas').innerHTML=loaded.map((x,i)=>i?x.c+' L'+x.l+' · '+(x.t-r.t>=0?'+':'')+(x.t-r.t).toFixed(3)+'s':x.c+' L'+x.l+' · REFERENCE').join('<br>');$('#sectorRows').innerHTML=loaded.map((x,i)=>'<div class="sector-line"><span>'+x.c+' · L'+x.l+'</span><span>26.'+(203+i*31)+'</span><span>31.'+(128+i*27)+'</span><span>'+((x.t-57.331-i*.058).toFixed(3))+'</span></div>').join('');drawAll()}function paths(i,n,type){let v=type==='Speed trace'?230+72*Math.sin(i*.12+n*.2)+32*Math.sin(i*.31):type==='Timing delta'?n*.06+.08*Math.sin(i*.14+n*.2):type==='Throttle application'?Math.max(0,80+36*Math.sin(i*.21+n*.2)-44*Math.max(0,Math.sin(i*.17))):Math.max(0,110*Math.max(0,Math.sin(i*.17+.5))**2);return v}function draw(type){let c=document.querySelector('[data-chart="'+type+'"]'),r=c.getBoundingClientRect(),d=devicePixelRatio||1;c.width=r.width*d;c.height=r.height*d;let x=c.getContext('2d'),lo=type==='Timing delta'?-0.3:0,hi=type==='Speed trace'?350:type==='Brake pressure'?120:100,L=42,R=6,T=8,B=10;x.scale(d,d);x.clearRect(0,0,r.width,r.height);x.strokeStyle='#d6d5cf';for(let k=0;k<3;k++){let y=T+(r.height-T-B)*k/2;x.beginPath();x.moveTo(L,y);x.lineTo(r.width-R,y);x.stroke()}loaded.forEach((q,n)=>{x.strokeStyle=D.find(z=>z[0]===q.c)[3];x.lineWidth=2;x.beginPath();for(let i=0;i<100;i++){let px=L+i*(r.width-L-R)/99,py=T+(hi-paths(i,n,type))/(hi-lo)*(r.height-T-B);i?x.lineTo(px,py):x.moveTo(px,py)}x.stroke()})}function drawAll(){['Speed trace','Timing delta','Throttle application','Brake pressure'].forEach(draw)}function charts(){let a=['Speed trace','Timing delta','Throttle application','Brake pressure'];$('#charts').innerHTML=a.map((x,i)=>'<div class="chart-box '+(i>1?'small':'')+'"><div class="chart-title"><span>'+x+'</span><small>'+(i===0?'KM/H':i===1?'SECONDS VS REFERENCE':i===2?'%':'BAR')+'</small></div>'+(i===0?'<div class="sector-overlay"><i>SECTOR 1</i><i>SECTOR 2</i><i>SECTOR 3</i></div><div class="tip" id="tip"></div>':'')+'<canvas data-chart="'+x+'"></canvas></div>').join('');let c=document.querySelector('[data-chart="Speed trace"]');c.onmousemove=e=>{let r=c.getBoundingClientRect(),p=Math.max(0,Math.min(1,(e.clientX-r.left-42)/(r.width-48))),i=Math.round(p*99),t=$('#tip');t.style.cssText='display:block;left:'+Math.max(42,e.clientX-r.left+10)+'px;top:'+(e.clientY-r.top-22)+'px';t.innerHTML='<b>'+(p*5.891).toFixed(3)+' KM</b><br>'+loaded.map((q,n)=>q.c+' '+Math.round(paths(i,n,'Speed trace'))+' km/h').join('<br>')};c.onmouseleave=()=>$('#tip').style.display='none'}$('#load').onclick=()=>{selected=['VER'];loaded=[{c:'VER',l:12,t:86.522}];stint={VER:0};drivers();laps();render()};window.onresize=drawAll;drivers();laps();charts();render();
</script></body></html>
